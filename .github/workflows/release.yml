name: Release

# Build + sign + publish the gg-app desktop bundle for every OS/arch on a tag
# push (v*). Each runner stages its own per-platform Node runtime and bundles
# the sidecar (so sharp's native binary matches the target), then tauri-action
# produces the installers, signs the updater artifacts, uploads them to a draft
# GitHub release, and generates `latest.json` for the updater endpoint.
#
# Required repository secrets:
#   Updater signing (all OSes):
#     TAURI_SIGNING_PRIVATE_KEY           — minisign private key (must match the
#                                           `plugins.updater.pubkey` in tauri.conf.json)
#     TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — password for that key
#   macOS code signing + notarization (only used on the macOS matrix legs):
#     APPLE_CERTIFICATE           — base64 of the exported "Developer ID Application" .p12
#     APPLE_CERTIFICATE_PASSWORD  — password set when exporting that .p12
#     APPLE_SIGNING_IDENTITY      — e.g. "Developer ID Application: NAME (396M7LY29W)"
#     KEYCHAIN_PASSWORD           — any throwaway password for the CI keychain
#     APPLE_ID                    — Apple ID email used for notarization
#     APPLE_PASSWORD              — app-specific password for that Apple ID
#     APPLE_TEAM_ID               — Apple Team ID (396M7LY29W)
# Signing/notarization is skipped automatically if the secrets are absent
# (unsigned build still succeeds). Windows code signing is a follow-up — see
# DISTRIBUTION.md.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon (arm64)
            args: "--target aarch64-apple-darwin"
          - platform: macos-13 # Intel (x64)
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
          - platform: ubuntu-latest
            # Skip AppImage: linuxdeploy reliably hangs on CI runners for apps
            # that bundle a Node runtime + many resources. deb + rpm cover the
            # mainstream Linux install paths without the hang.
            args: "--bundles deb,rpm"
    runs-on: ${{ matrix.platform }}
    # Hoisted to job level so the certificate-import step's own `if` can read it
    # (a step cannot reference env it defines in the same step's `if`).
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Linux system deps (tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: |
          pnpm --filter @kenkaiiii/gg-ai build
          pnpm --filter @kenkaiiii/gg-agent build
          pnpm --filter @kenkaiiii/ggcoder build

      - name: Stage node runtime + bundle sidecar
        run: |
          pnpm --filter gg-app stage:node
          pnpm --filter gg-app bundle:sidecar
        shell: bash

      - name: Sidecar smoke (bundled runtime + bundle)
        run: node gg-app/scripts/smoke-sidecar.mjs
        shell: bash

      # Import the Developer ID Application cert into a throwaway CI keychain so
      # codesign can find it. macOS only, and only when the secret is present —
      # an empty APPLE_CERTIFICATE leaves the build unsigned but still green.
      - name: Import Apple Developer certificate (macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm -f certificate.p12

      # Sign the nested Mach-O binaries Tauri won't touch (the staged Node
      # runtime + the sidecar's native addons under bundle.resources) with
      # Developer ID + hardened runtime + secure timestamp, so notarization of
      # the assembled app passes. Runs after the cert is in the keychain and
      # before tauri-action assembles + notarizes the bundle.
      - name: Sign nested bundle binaries (macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        run: |
          bash gg-app/scripts/sign-nested-macos.sh \
            "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            gg-app/src-tauri/binaries \
            gg-app/src-tauri/sidecar

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing + notarization. On non-macOS legs these are empty and
          # ignored; on macOS, empty secrets mean Tauri produces an unsigned app.
          # (APPLE_CERTIFICATE is inherited from the job-level env.)
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: gg-app
          tagName: ${{ github.ref_name }}
          releaseName: "gg-coder ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          args: ${{ matrix.args }}
